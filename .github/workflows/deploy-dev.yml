name: Deploy → Dev (Hetzner)

on:
  push:
    branches: [dev]
    paths:
      - 'trading_strategy_engine/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'setup.py'
  workflow_dispatch:

env:
  IMAGE: ghcr.io/zmz-commits/trading-strategy-engine
  TAG: dev
  SERVICE: engine-dev

jobs:
  deploy:
    name: Build, push to ghcr, deploy to Hetzner VM
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ env.TAG }}
            ${{ env.IMAGE }}:${{ env.TAG }}-${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Hetzner VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: deploy
          key: ${{ secrets.SSH_KEY }}
          envs: GHCR_TOKEN
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u zmz-commits --password-stdin
            cd /opt/trading-platform/deploy
            docker compose pull ${{ env.SERVICE }}
            docker compose up -d ${{ env.SERVICE }}
            docker image prune -f
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
